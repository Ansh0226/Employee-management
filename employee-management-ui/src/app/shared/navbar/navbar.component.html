<header class="navbar">
  <a routerLink="/" class="brand">
    <span class="brand-mark">EMS</span>
    <span>EMS</span>
  </a>

  <div class="nav-actions">
    <button type="button" class="nav-button" (click)="theme.toggleTheme()">
      {{ theme.isDark() ? 'Light' : 'Dark' }} mode
    </button>

    @if (isAuthenticated()) {
      @if (showRefresh()) {
        <button type="button" class="nav-button" (click)="onRefresh()">Refresh data</button>
      }

      <button type="button" class="nav-button profile-pill" title="Profile" (click)="openProfile()">
        @if (currentProfile()?.profileImage) {
          <img [src]="currentProfile()?.profileImage" alt="Profile" class="nav-profile-photo" />
        } @else {
          <span class="profile-icon">{{ profileLabel() }}</span>
        }
        <span>{{ currentUsername() }}</span>
      </button>

      <button type="button" class="nav-button nav-primary" (click)="logout()">Logout</button>
    } @else {
      <a routerLink="/login" class="nav-button" [class.nav-active]="activePage() === 'login'">Login</a>
      <a routerLink="/register" class="nav-button" [class.nav-active]="activePage() === 'register'">Signup</a>
    }
  </div>
</header>

@if (profileVisible) {
  <app-profile-modal
    [profile]="currentProfile()"
    [profileLabel]="profileLabel()"
    (close)="closeProfile()"
  />
}
