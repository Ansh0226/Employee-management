<app-dashboard-layout title="Employee Dashboard" [items]="menuItems" activeItem="/employee/exports" [refreshHandler]="store.refresh.bind(store)">

    [store]="store"
    title="Directory exports"
    [showRoleEditor]="false"

  />
</app-dashboard-layout>
