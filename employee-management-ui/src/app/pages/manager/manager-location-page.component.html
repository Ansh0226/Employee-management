<app-dashboard-layout title="Manager Dashboard" [items]="menuItems" activeItem="/manager/location" [refreshHandler]="store.refresh.bind(store)">
  <app-directory-workspace
    [store]="store"
    title="Location updates"
    [showRoleEditor]="false"
    [showLocationEditor]="true"
    [showApprovals]="false"
    [showAgeFilters]="true"
    [showSortControls]="true"
    [showExportButtons]="false"
    [showDetailAsModal]="true"
  />
</app-dashboard-layout>
